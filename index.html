<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osman Sudoku</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Osman Sudoku</h1>

    <div class="top-bar">
      <div class="info-box">Time: <span id="timer">00:00</span></div>
      <div class="info-box">Mistakes: <span id="mistakes">0</span>/3</div>
    </div>

    <div class="controls">
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>

      <button id="new-game-btn">New Game</button>
      <button id="notes-btn">Notes: Off</button>
      <button id="erase-btn">Erase</button>
    </div>

    <div id="board" class="board"></div>

    <div id="number-pad" class="number-pad"></div>

    <div id="message" class="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
