<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sudoku</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="controls">
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>

      <button id="new-game-btn">New Game</button>
      <button id="notes-btn">Notes: Off</button>
      <button id="erase-btn">Erase</button>
      <button id="hint-btn">Hint</button>
      <button id="theme-btn">Theme: Dark</button>
    </div>

    <div id="board" class="board" aria-label="Sudoku board"></div>

    <input
      id="cell-input"
      class="cell-input"
      type="text"
      inputmode="numeric"
      pattern="[1-9]*"
      maxlength="1"
      autocomplete="off"
    />

    <div id="message" class="message"></div>

    <div id="victory-overlay" class="victory-overlay hidden">
      <div class="victory-card">
        <div class="trophy">🏆</div>
        <div class="victory-title">You Win!</div>
        <div id="victory-time" class="victory-time"></div>
        <button id="play-again-btn" class="play-again-btn">Play Again</button>
      </div>
      <div id="confetti-container" class="confetti-container"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
